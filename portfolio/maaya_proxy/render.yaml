services:
  - type: web
    name: maaya-groq-proxy
    env: python
    rootDir: portfolio/maaya_proxy
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-2.0-flash,gemini-2.5-flash
      - key: MAAYA_LLM_PROVIDERS
        value: groq,gemini
